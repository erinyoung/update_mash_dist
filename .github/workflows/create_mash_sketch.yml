name: Step2 Create Sketches

on:
  workflow_run:
    workflows: ["Step1 Create Reference"]
    types: [completed]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  download_and_sketch:
    # Execution occurs only if Step 1 was successful or if manually triggered
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    permissions:
      actions: read
      contents: read
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        chunk: ["000", "001", "002", "003", "004", "005", "006", "007", "008", "009", "010", "011", "012", "013", "014", "015", "016", "017", "018", "019", "020", "021", "022", "023", "024", "025", "026", "027", "028", "029", "030", "031", "032", "033", "034", "035", "036", "037", "038", "039", "040", "041", "042", "043", "044", "045", "046", "047", "048", "049", "050", "051", "052", "053", "054", "055", "056", "057", "058", "059", "060", "061", "062", "063", "064", "065", "066", "067", "068", "069", "070", "071", "072", "073", "074", "075", "076", "077", "078", "079", "080", "081", "082", "083", "084", "085", "086", "087", "088", "089", "090", "091", "092", "093", "094", "095", "096", "097", "098", "099"]
    
    steps:
      - name: Check Out Repository
        uses: actions/checkout@v4

      - name: Wait for Artifact Propagation
        run: sleep 30s

      - name: Download ID Chunks
        uses: actions/download-artifact@v5
        with:
          name: genome-chunks
          path: chunks/
          # Targets the run ID of the triggering Step 1 workflow
          run-id: ${{ github.event.workflow_run.id || github.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Dependencies
        run: |
          wget -q https://ftp.ncbi.nlm.nih.gov/pub/datasets/command-line/v2/linux-amd64/datasets
          wget -q https://ftp.ncbi.nlm.nih.gov/pub/datasets/command-line/v2/linux-amd64/dataformat
          wget -q https://github.com/marbl/Mash/releases/download/v2.3/mash-Linux64-v2.3.tar
          tar -xf mash-Linux64-v2.3.tar
          mv mash-Linux64-v2.3/mash .
          chmod +x datasets dataformat mash
          echo "$(pwd)" >> $GITHUB_PATH

      - name: Sketching Loop with Hard Failure
        run: |
          mkdir -p tmp_workspace
          CHUNK_FILE="chunks/x${{ matrix.chunk }}.txt"
          echo "Processing chunk: ${{ matrix.chunk }}"

          while read -r line; do
            id=$(echo "$line" | awk '{print $1}')
            ge=$(echo "$line" | awk '{print $2}')
            sp=$(echo "$line" | awk '{print $3}')
            [ -z "$ge" ] && ge="unknown"
            [ -z "$sp" ] && sp="unknown"

            # Disk cleanup per iteration
            rm -f ncbi_dataset.zip
            rm -rf ncbi_dataset/

            # Robust download with incremental backoff
            MAX_RETRIES=10
            attempt=0
            success=false

            until [ $attempt -ge $MAX_RETRIES ]; do
              echo "Downloading $id (Attempt $((attempt+1))/$MAX_RETRIES)..."
              if datasets download genome accession "$id" --no-progressbar --filename "ncbi_dataset.zip"; then
                if [ -s "ncbi_dataset.zip" ]; then
                  success=true
                  break
                fi
              fi
              attempt=$((attempt+1))
              wait_time=$((attempt * 25))
              sleep ${wait_time}s
            done

            if [ "$success" = false ]; then
              echo "Fatal: Failed to download $id after $MAX_RETRIES attempts."
              exit 1
            fi

            # Extraction and metadata sketching
            unzip -q ncbi_dataset.zip
            GENOME_PATH=$(find ncbi_dataset/data -name "*_genomic.fna" | head -n 1)
            
            if [ -n "$GENOME_PATH" ]; then
              if [ ! -f "chunk_final.msh" ]; then
                mash sketch "$GENOME_PATH" -o chunk_final -I "${ge}_${sp}_${id}"
              else
                mash sketch "$GENOME_PATH" -o single_sample -I "${ge}_${sp}_${id}"
                mash paste new_combined chunk_final.msh single_sample.msh
                mv new_combined.msh chunk_final.msh
              fi
            else
              echo "Error: Fasta file missing in dataset for $id"
              exit 1
            fi
          done < "$CHUNK_FILE"

          # Rename output for artifact collection
          mv chunk_final.msh "${{ matrix.chunk }}.msh"

      - name: Upload Chunk Result
        uses: actions/upload-artifact@v5
        with:
          name: msh-results-${{ matrix.chunk }}
          path: "${{ matrix.chunk }}.msh"
          retention-days: 1

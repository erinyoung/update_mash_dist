name: Step3 Combine sketches

on:
  workflow_run:
    workflows: ["Step2 Create Sketches"]
    types: [completed]
  workflow_dispatch:
    inputs:
      version:
        description: "Override RefSeq version (leave blank for auto-detect)"
        required: false
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  pull_together:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: read
    
    steps:
      - name: Check Out Repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Fetch Current RefSeq Version
        id: refseq
        run: |
          # Use manual input if provided, otherwise fetch from NCBI
          if [ -n "${{ github.event.inputs.version }}" ]; then
            RS_VERSION="${{ github.event.inputs.version }}"
          else
            RS_VERSION=$(curl -s https://ftp.ncbi.nlm.nih.gov/refseq/release/RELEASE_NUMBER)
          fi
          
          echo "VERSION=$RS_VERSION" >> $GITHUB_ENV
          echo "RefSeq Version detected: $RS_VERSION"

      - name: Download all Chunk Artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: msh-results-*
          path: all_sketches/
          merge-multiple: true
          run-id: ${{ github.event.workflow_run.id || github.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Mash v2.3
        run: |
          wget -q https://github.com/marbl/Mash/releases/download/v2.3/mash-Linux64-v2.3.tar
          tar -xf mash-Linux64-v2.3.tar
          mv mash-Linux64-v2.3/mash .
          chmod +x mash
          echo "$(pwd)" >> $GITHUB_PATH

      - name: Paste and Compress
        run: |
          mkdir -p data/
          rm -f data/RefSeqSketches*msh*
          
          # Use the environment variable set in the fetch step
          OUTPUT_FILE="RefSeqSketches_${{ env.VERSION }}.msh"
          
          ./mash paste "data/${OUTPUT_FILE}" all_sketches/*.msh
          gzip -9 "data/${OUTPUT_FILE}"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Update mash reference to RefSeq version ${{ env.VERSION }}"
          title: "Update Master Reference Sketch (v${{ env.VERSION }})"
          branch: "update-master-reference"
          base: main
          add-paths: |
            data/*.msh.gz
            .gitattributes
          body: |
            Combined 100 genomic sketch chunks from Step 2.
            - RefSeq Version: ${{ env.VERSION }}
            - Input: 100 matrix artifacts
            - Output: data/RefSeqSketches_${{ env.VERSION }}.msh.gz
